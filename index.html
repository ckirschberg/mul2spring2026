<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JavaScript Exercises</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Todo App / eksempel</h1>
    <input type="text" placeholder="Todo text here..." id="todoText"/>
    <button id="btnAddTodo">Add Todo</button>

    <ul id="todos">

    </ul>




    <h1>JavaScript Exercises</h1>

    <h2>Click Counter</h2>

    <p>
        Clicks: <span id="count">0</span>
    </p>

    <button id="clickButton">
        Click me
    </button>


    <h2>Like Button</h2>

    <button id="likeButton">
        🤍 Like
    </button>


    <h2>Show More</h2>

    <p>
        This is a short text
    </p>

    <p id="moreText" class="hidden">
        This is hidden text that appears when clicking the button.
    </p>

    <button id="showButton">
        Show more
    </button>

    <p id="jeppeSerPåSinTelefon"></p>


    <p id="question"></p>
    <p id="answer" class="hidden"></p>
    <button id="btnShow">Show me the answer!</button>



    <script src="script.js"></script>

</body>
</html>
